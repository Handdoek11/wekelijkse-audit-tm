<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalkMark — Weekly Metrics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <style>
    :root {
      --ios: #007AFF;
      --android: #34A853;
      --revenue: #7C3AED;
      --sessions: #0D9488;
      --signups: #F59E0B;
      --bg: #F9FAFB;
      --card: #FFFFFF;
      --text: #111827;
      --muted: #6B7280;
      --border: #E5E7EB;
      --positive: #10B981;
      --negative: #EF4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      max-width: 1280px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 24px;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header .updated { color: var(--muted); font-size: 0.85rem; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 1.5rem; font-weight: 700; margin: 4px 0; }
    .card .delta { font-size: 0.8rem; font-weight: 500; }
    .card .delta.up { color: var(--positive); }
    .card .delta.down { color: var(--negative); }

    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 24px;
    }
    .chart-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .chart-box h2 { font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; }
    .chart-box canvas { width: 100% !important; height: 280px !important; }

    .error, .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 1rem;
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .charts { grid-template-columns: 1fr; }
      .cards { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <h1>TalkMark Weekly Metrics</h1>
  <span class="updated" id="updated"></span>
</header>

<div id="summary" class="cards"></div>
<div id="charts" class="charts"></div>
<div id="error" class="error" style="display:none"></div>

<footer>Data collected automatically every Monday via GitHub Actions</footer>

<script>
// ============================================================
// CONFIGURATION — update these two values for your project
// ============================================================
const SUPABASE_URL  = "https://uznutxihifijmlgrfime.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6bnV0eGloaWZpam1sZ3JmaW1lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkyOTY2NTcsImV4cCI6MjA3NDg3MjY1N30.gZBHj-qIyp11FoI6PUGvOtXZglopkh8uz3_JAJERWds";
// ============================================================

const API = `${SUPABASE_URL}/rest/v1/weekly_metrics?apikey=${SUPABASE_ANON}&order=week_start.asc&limit=52`;

const COLORS = {
  ios: "#007AFF", android: "#34A853", revenue: "#7C3AED",
  sessions: "#0D9488", signups: "#F59E0B", bounce: "#EF4444",
};

(async () => {
  try {
    const res = await fetch(API, { headers: { Accept: "application/json" } });
    if (!res.ok) throw new Error(`API returned ${res.status}`);
    const rows = await res.json();

    if (!rows.length) {
      document.getElementById("error").style.display = "block";
      document.getElementById("error").textContent = "No data yet. Run the collection pipeline first.";
      return;
    }

    renderSummary(rows);
    renderCharts(rows);

    const latest = rows[rows.length - 1];
    document.getElementById("updated").textContent = `Week of ${latest.week_start}`;
  } catch (err) {
    document.getElementById("error").style.display = "block";
    document.getElementById("error").innerHTML =
      `<strong>Failed to load data</strong><br>${err.message}<br><br>Check your Supabase URL and anon key in the script.`;
  }
})();

// ── Summary Cards ──────────────────────────────────────────

function renderSummary(rows) {
  const curr = rows[rows.length - 1];
  const prev = rows.length > 1 ? rows[rows.length - 2] : null;

  const cards = [
    { label: "MRR",           value: fmt(curr.mrr, "€"),           delta: pctChange(curr.mrr, prev?.mrr) },
    { label: "Churn Rate",    value: fmt(curr.churn_rate, "", "%"), delta: pctChange(curr.churn_rate, prev?.churn_rate, true) },
    { label: "New Signups",   value: fmt(curr.new_signups),        delta: pctChange(curr.new_signups, prev?.new_signups) },
    { label: "Active Users",  value: fmt(curr.active_users),       delta: pctChange(curr.active_users, prev?.active_users) },
    { label: "Sessions",      value: fmt(curr.ga4_sessions),       delta: pctChange(curr.ga4_sessions, prev?.ga4_sessions) },
    { label: "Bounce Rate",   value: fmtPct(curr.ga4_bounce_rate), delta: pctChange(curr.ga4_bounce_rate, prev?.ga4_bounce_rate, true) },
    { label: "iOS Downloads", value: fmt(curr.ios_downloads),      delta: pctChange(curr.ios_downloads, prev?.ios_downloads) },
    { label: "Android Downloads", value: fmt(curr.android_downloads), delta: pctChange(curr.android_downloads, prev?.android_downloads) },
  ];

  const container = document.getElementById("summary");
  container.innerHTML = cards.map((c) => `
    <div class="card">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      ${c.delta !== null ? `<div class="delta ${c.delta.cls}">${c.delta.text}</div>` : ""}
    </div>
  `).join("");
}

// ── Charts ─────────────────────────────────────────────────

function renderCharts(rows) {
  const labels = rows.map((r) => r.week_start);
  const container = document.getElementById("charts");

  const charts = [
    {
      title: "Sessions & Users",
      datasets: [
        ds("Sessions", rows, "ga4_sessions", COLORS.sessions),
        ds("Active Users", rows, "ga4_users", COLORS.signups),
      ],
    },
    {
      title: "Downloads",
      datasets: [
        ds("iOS", rows, "ios_downloads", COLORS.ios),
        ds("Android", rows, "android_downloads", COLORS.android),
      ],
    },
    {
      title: "App Ratings",
      datasets: [
        ds("iOS", rows, "ios_rating", COLORS.ios),
        ds("Android", rows, "android_rating", COLORS.android),
      ],
      yMin: 1, yMax: 5,
    },
    {
      title: "Monthly Recurring Revenue",
      datasets: [
        { ...ds("MRR", rows, "mrr", COLORS.revenue), fill: true, backgroundColor: COLORS.revenue + "20" },
      ],
    },
    {
      title: "New Signups",
      datasets: [ds("Signups", rows, "new_signups", COLORS.signups)],
      type: "bar",
    },
    {
      title: "Crashes",
      datasets: [
        ds("iOS", rows, "ios_crashes", COLORS.ios),
        ds("Android", rows, "android_crashes", COLORS.android),
      ],
    },
  ];

  for (const cfg of charts) {
    const box = document.createElement("div");
    box.className = "chart-box";
    box.innerHTML = `<h2>${cfg.title}</h2><canvas></canvas>`;
    container.appendChild(box);

    new Chart(box.querySelector("canvas"), {
      type: cfg.type ?? "line",
      data: { labels, datasets: cfg.datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: { legend: { position: "bottom" } },
        scales: {
          x: {
            type: "time",
            time: { unit: "week", tooltipFormat: "MMM dd, yyyy" },
          },
          y: {
            beginAtZero: cfg.yMin == null,
            min: cfg.yMin,
            max: cfg.yMax,
          },
        },
      },
    });
  }
}

// ── Helpers ────────────────────────────────────────────────

function ds(label, rows, key, color) {
  return {
    label,
    data: rows.map((r) => r[key]),
    borderColor: color,
    backgroundColor: color,
    borderWidth: 2,
    pointRadius: 3,
    tension: 0.3,
  };
}

function fmt(val, prefix = "", suffix = "") {
  if (val == null) return "—";
  const n = typeof val === "string" ? parseFloat(val) : val;
  if (isNaN(n)) return "—";
  if (prefix === "€") return `€${n.toLocaleString("nl-NL", { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
  return `${prefix}${n.toLocaleString("en-US")}${suffix}`;
}

function fmtPct(val) {
  if (val == null) return "—";
  const n = typeof val === "string" ? parseFloat(val) : val;
  if (isNaN(n)) return "—";
  // GA4 returns bounce rate as 0-1 ratio; multiply by 100 for display
  const pct = n <= 1 ? n * 100 : n;
  return `${pct.toFixed(1)}%`;
}

function pctChange(curr, prev, invertColor = false) {
  if (curr == null || prev == null || prev === 0) return null;
  const pct = ((curr - prev) / Math.abs(prev)) * 100;
  const isUp = pct > 0;
  const cls = invertColor ? (isUp ? "down" : "up") : (isUp ? "up" : "down");
  const arrow = isUp ? "\u2191" : "\u2193";
  return { text: `${arrow} ${Math.abs(pct).toFixed(1)}%`, cls };
}
</script>
</body>
</html>
